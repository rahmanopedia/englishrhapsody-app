<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>English Rhapsody | İnteraktif Dil Akademisi</title>
  
  <!-- PWA & Mobile Optimization -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0c10">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Rhapsody">
  <link rel="apple-touch-icon" href="https://img.icons8.com/nolan/192/globe.png">
  <meta name="mobile-web-app-capable" content="yes">
  
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash-screen" style="position:fixed; inset:0; background:#0b0c10; z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'Outfit',sans-serif; color:white;">
    <div style="font-size:2.5rem; font-weight:900; margin-bottom:20px;">English<span style="color:#00f3ff;"> Rhapsody</span></div>
    <div class="spinner" style="width:40px; height:40px; border:4px solid rgba(0,243,255,0.1); border-top-color:#00f3ff; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="margin-top:20px; color:#8b9bb4; font-weight:600;">Yükleniyor...</p>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>

  <!-- Onboarding Assessment Overlay -->
  <div id="onboarding-overlay" style="display:none">
    <div class="ob-bg-particles" id="ob-particles"></div>
    <div class="ob-container">
      <!-- Top bar: logo + skip -->
      <div class="ob-topbar">
        <div class="ob-logo">English<span> Rhapsody</span></div>
        <button class="ob-skip-btn" onclick="app.skipOnboarding()">Atla →</button>
      </div>
      <!-- Progress bar -->
      <div class="ob-progress-wrap" id="ob-progress-wrap" style="display:none">
        <div class="ob-progress-bar" id="ob-progress-bar"></div>
        <span class="ob-progress-label" id="ob-progress-label">1 / 5</span>
      </div>
      <!-- Dynamic screen -->
      <div class="ob-screen" id="ob-screen"></div>
    </div>
  </div>

  <canvas id="bg-canvas"></canvas>

  <nav class="glass-nav">
    <div class="logo">English<span class="neon-text"> Rhapsody</span></div>
    <div class="nav-links desktop-only">
      <button class="nav-btn active ripple" data-target="home">🚀 Ana Merkez</button>
      <button class="nav-btn ripple" data-target="learn">🃏 Akıllı Kartlar</button>
      <button class="nav-btn ripple" data-target="reading">📖 Okuma</button>
      <button class="nav-btn ripple" data-target="analytics">📊 Gelişim</button>
      <button class="nav-btn ripple" data-target="league">🏆 Lig</button>
      <button class="nav-btn ripple" data-target="phrases">🗣️ Kalıplar</button>
      <button class="nav-btn ripple" data-target="speak">🎙️ Konuşma</button>
    </div>
    <div class="stats">
      <button class="focus-btn ripple" onclick="app.toggleFocusMode()" title="Odak Modu">🧘</button>
      <div class="stat-badge streak">🔥 <span id="streak-val">1</span></div>
      <div class="stat-badge xp">⚡ <span id="xp-val">0</span> XP</div>
      <div class="stat-badge lvl">🏆 Lv <span id="lvl-val">1</span></div>
    </div>
  </nav>

  <!-- Mobile Bottom Nav -->
  <div class="mobile-nav" style="overflow-x: auto; justify-content: flex-start; gap: 15px; padding: 0 15px;">
    <button class="m-nav-btn active ripple" data-target="home">
      <span class="m-icon">🏠</span>
      <span class="m-label">Ana Merkez</span>
    </button>
    <button class="m-nav-btn ripple" data-target="learn">
      <span class="m-icon">🃏</span>
      <span class="m-label">Kartlar</span>
    </button>
    <button class="m-nav-btn ripple" data-target="reading">
      <span class="m-icon">📖</span>
      <span class="m-label">Okuma</span>
    </button>
    <button class="m-nav-btn ripple" data-target="phrases">
      <span class="m-icon">🗣️</span>
      <span class="m-label">Kalıplar</span>
    </button>
    <button class="m-nav-btn ripple" data-target="analytics">
      <span class="m-icon">📊</span>
      <span class="m-label">Analiz</span>
    </button>
    <button class="m-nav-btn ripple" data-target="league">
      <span class="m-icon">🏆</span>
      <span class="m-label">Lig</span>
    </button>
    <button class="m-nav-btn ripple" data-target="speak">
      <span class="m-icon">🎙️</span>
      <span class="m-label">Konuşma</span>
    </button>
  </div>

  <main id="app-content"></main>

  <div id="toast-container"></div>
  <div id="confetti-canvas-container" style="position:fixed; inset:0; pointer-events:none; z-index:10001;"></div>

  <!-- External Libraries -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Templates -->
  <template id="tpl-reading">
    <div class="view-reading animate-in">
      <div class="reading-header">
        <h1>📖 Hikayeler & Bağlam</h1>
        <p>Okuduğunu anlama ve boşluk doldurma (Cloze Deletion)</p>
      </div>

      <div class="reading-levels glass">
        <button class="rd-level-btn active" onclick="app.setReadingLevel('Kolay', this)">Kolay</button>
        <button class="rd-level-btn" onclick="app.setReadingLevel('Orta', this)">Orta</button>
        <button class="rd-level-btn" onclick="app.setReadingLevel('İleri', this)">İleri</button>
      </div>

      <div id="reading-game-area" class="glass" style="margin-top: 20px; padding: 25px; border-radius: 20px; position: relative;">
        <!-- JS renders active story here -->
      </div>
    </div>
  </template>
  <template id="tpl-analytics">
    <div class="view-analytics animate-in">
      <div class="analytics-header">
        <h1>📊 Gelişim Analizi</h1>
        <p>Öğrenme istatistiklerin ve hedef takibi</p>
      </div>
      
      <div class="analytics-grid">
        <div class="ana-card glass">
          <h3>Öğrenme Isı Haritası</h3>
          <div id="learning-heatmap" class="heatmap-container"></div>
        </div>
        <div class="ana-card glass">
          <h3>Kategori Başarısı</h3>
          <canvas id="category-chart"></canvas>
        </div>
      </div>
    </div>
  </template>

  <template id="tpl-league">
    <div class="view-league animate-in">
      <div class="league-header">
        <h1>🏆 Haftalık Lig</h1>
        <div class="league-badge-container">
          <div class="league-badge" id="current-league-icon">💎</div>
          <div>
            <h2 id="current-league-name">Elmas Ligi</h2>
            <p>Bitime: <span id="league-timer">2g 4s</span></p>
          </div>
        </div>
      </div>
      
      <div class="league-list glass" id="league-list-container">
        <!-- JS dynamic render -->
      </div>
    </div>
  </template>
  <template id="tpl-home">
    <div class="view-home animate-in">

      <!-- Greeting Banner -->
      <div class="home-greeting">
        <div class="greeting-header">
          <span id="home-greeting-text">🌟 Hoş geldin!</span>
          <span id="home-date"></span>
        </div>
        <div class="home-rank-badge" id="home-rank-badge">
          <span class="rank-icon" id="rank-icon">🌱</span>
          <span class="rank-name" id="rank-name">Çırak</span>
        </div>
        <div class="accent-selector">
          <button class="accent-btn" onclick="app.setVoiceAccent('en-US')">🇺🇸 US</button>
          <button class="accent-btn" onclick="app.setVoiceAccent('en-GB')">🇬🇧 UK</button>
        </div>
      </div>

      <!-- Quick Stats Row -->
      <div class="home-stats-row">
        <div class="hs-card">
          <span class="hs-val" id="hs-mastered">0</span>
          <span class="hs-label">Kelime</span>
        </div>
        <div class="hs-card">
          <span class="hs-val" id="hs-phrases">0</span>
          <span class="hs-label">Kalıp</span>
        </div>
        <div class="hs-card hs-streak">
          <span class="hs-val" id="hs-streak">🔥1</span>
          <span class="hs-label">Gün Serisi</span>
        </div>
        <div class="hs-card hs-xp">
          <span class="hs-val" id="hs-xp">0</span>
          <span class="hs-label">Lv <span id="hs-lvl">1</span> XP</span>
        </div>
      </div>

      <!-- Word of the Day -->
      <div class="home-wod glass">
        <div class="wod-content">
          <div class="wod-label">⭐ Günün Kelimesi</div>
          <div class="wod-en" id="wod-en">—</div>
          <div class="wod-ipa" id="wod-ipa"></div>
          <div class="wod-tr" id="wod-tr"></div>
        </div>
        <button class="wod-speak" onclick="app.speakWord(document.getElementById('wod-en').innerText)">🔊 Dinle</button>
      </div>

      <!-- XP Level Bar -->
      <div class="home-xp-bar glass">
        <div class="xp-bar-info">
          <span>⚡ Level <span id="home-lvl-display">1</span></span>
          <span id="xp-to-go">100 XP kaldı</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="home-progress" style="width: 0%"></div>
        </div>
      </div>

      <!-- Action Cards -->
      <div class="dashboard-grid">
        <div class="dash-card glass" onclick="app.navigate('learn')">
          <div class="d-icon">🧠</div>
          <h3>Görsel Hafıza</h3>
          <p>Yeni kelimeleri 3D kartlar ve sesli telaffuzlarla öğren.</p>
          <div class="dc-progress-row">
            <div class="dc-progress-bar-wrap"><div class="dc-progress-bar" id="dc-words-bar" style="width:0%"></div></div>
            <span class="dc-pct" id="dc-words-pct">0%</span>
          </div>
        </div>
        <div class="dash-card glass" onclick="app.navigate('phrases')">
          <div class="d-icon">🗣️</div>
          <h3>Günlük Kalıplar</h3>
          <p>Gerçek hayatta kullanılan İngilizce ifadeleri çalış.</p>
          <div class="dc-progress-row">
            <div class="dc-progress-bar-wrap"><div class="dc-progress-bar dc-bar-purple" id="dc-phrases-bar" style="width:0%"></div></div>
            <span class="dc-pct" id="dc-phrases-pct">0%</span>
          </div>
        </div>
        <div class="dash-card glass" onclick="app.navigate('speak')">
          <div class="d-icon">🎙️</div>
          <h3>AI Konuşma Koçu</h3>
          <p>Mikrofonu aç ve konuş. Yapay zeka telaffuzunu puanlasın.</p>
          <div class="dc-progress-row">
            <span class="dc-speak-hint" id="dc-speak-hint">Bugün dene →</span>
          </div>
        </div>
      </div>

      <!-- Category Progress -->
      <div class="home-cats glass">
        <div class="home-cats-title">📂 Kategori İlerlemesi</div>
        <div id="home-cat-bars"></div>
      </div>

    </div>
  </template>

  <template id="tpl-learn">
    <div class="view-learn animate-in">

      <!-- SETUP SCREEN -->
      <div id="learn-setup" class="learn-setup-wrapper">
        <div class="setup-hero">
          <div class="setup-hero-icon">🧠</div>
          <h2>Görsel Hafıza Merkezi</h2>
          <p class="setup-hero-sub">Kategori seç, mod belirle ve öğrenmeye başla!</p>
        </div>
        <div class="setup-body glass">
          <div class="setup-cols">
            <div class="setup-col">
              <div class="setup-section-label">📂 Kategori &amp; Ustalık</div>
              <div id="learn-categories" class="cat-btns cat-btns-grid"></div>
            </div>
            <div class="setup-col">
              <div class="setup-section-label">🎮 Oyun Modu</div>
              <div class="setup-mode-cards">
                <div class="mode-card" onclick="app.startLearnSession('normal')">
                  <span class="mode-icon">🧘</span>
                  <strong>Standart</strong>
                  <small>Kendi hızında, rahat öğren</small>
                </div>
                <div class="mode-card" onclick="app.startLearnSession('timed')">
                  <span class="mode-icon">⏱️</span>
                  <strong>Zamana Karşı</strong>
                  <small>45 saniye, hızlı düşün!</small>
                </div>
                <div class="mode-card mode-card-pink mobile-only" onclick="app.startVisualMatch()">
                  <span class="mode-icon">🎮</span>
                  <strong>Resim Bulmaca</strong>
                  <small>Doğru resmi seç</small>
                </div>
                <div class="mode-card mode-card-green" onclick="app.startSpellingQuiz()">
                  <span class="mode-icon">✍️</span>
                  <strong>Yazım Testi</strong>
                  <small>Türkçeden İngilizceyi yaz</small>
                </div>
              </div>
              <div class="setup-section-label" style="margin-top:20px">🎤 Sesli Kontrol</div>
              <div class="voice-toggle-wrap">
                <button id="btn-voice-nav" class="btn outline tiny" onclick="app.toggleVoiceNav()">🎤 Sesli Kontrol: KAPALI</button>
                <span class="hint-text">"Flip", "Easy", "Hard" komutları</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- GAME SCREEN -->
      <div id="learn-game" style="display:none" class="learn-game-wrapper">

        <div class="game-topbar glass">
          <button class="topbar-back" onclick="app.setupLearnView()">← Geri</button>
          <div class="topbar-center">
            <h2 id="learn-title">Görsel Hafıza</h2>
            <div class="session-bar-wrap"><div class="session-bar" id="session-progress" style="width:0%"></div></div>
          </div>
          <div class="topbar-right">
            <div id="timer-display" class="timer-badge" style="display:none">⏳ <span id="time-val">45</span>s</div>
            <span class="card-counter" id="card-counter">1 / 15</span>
          </div>
        </div>

        <div class="game-layout">
          <div id="flashcard-area" class="flashcard-section">
            <div class="swipe-indicator swipe-left-indicator">😓 ZOR</div>
            <div class="swipe-indicator swipe-right-indicator">😎 KOLAY</div>
            <div class="scene" id="card-scene">
              <div class="flashcard" id="flashcard" onclick="app.flipCard()">
                <div class="card-face front">
                  <div class="card-category" id="c-cat">Doğa</div>
                  <div class="card-image-wrap" id="c-img-container">
                    <img id="c-img" src="" alt="word visual">
                    <div class="card-icon-overlay" id="c-icon">🌊</div>
                  </div>
                  <h1 class="card-word" id="c-en">Word</h1>
                  <div class="card-ipa" id="c-ipa">/wɜːrd/</div>
                  <div class="card-controls">
                    <button class="btn-icon" onclick="event.stopPropagation(); app.speakWord(document.getElementById('c-en').innerText)">🔊 Telaffuz</button>
                  </div>
                  <div class="flip-hint">Detaylar için tıkla ↕</div>
                </div>
                <div class="card-face back">
                  <h1 class="card-tr" id="c-tr">Kelime</h1>
                  <div class="card-ex-wrap">
                    <p class="ex-label">Örnek Cümle</p>
                    <div class="card-ex" id="c-ex">"This is an example sentence."</div>
                  </div>
                  <div class="action-btns">
                    <button class="btn fail" onclick="event.stopPropagation(); app.answerCard(false)">😓 Zorlandım</button>
                    <button class="btn pass" onclick="event.stopPropagation(); app.answerCard(true)">😎 Kolaydı</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="swipe-hint-bar mobile-only">
              <span>← Kaydır: Zor</span>
              <span>Kolay: Sağa →</span>
            </div>
            <div class="kb-hint desktop-only">⌨️ <b>Boşluk</b> (Çevir) &nbsp;•&nbsp; <b>←</b> (Zor) &nbsp;•&nbsp; <b>→</b> (Kolay)</div>
          </div>

          <div class="game-sidebar desktop-only">
            <div class="sidebar-card glass">
              <div class="sidebar-title">📊 Oturum İstatistikleri</div>
              <div class="sidebar-stats">
                <div class="s-stat correct"><span class="s-stat-val" id="sb-correct">0</span><label>Kolay</label></div>
                <div class="s-stat wrong"><span class="s-stat-val" id="sb-wrong">0</span><label>Zor</label></div>
              </div>
            </div>
            <div class="sidebar-card glass">
              <div class="sidebar-title">💡 Klavye Kısayolları</div>
              <ul class="sidebar-tips">
                <li>🖱️ Karta tıkla → çevir</li>
                <li>→ Kolay (Arrow Right)</li>
                <li>← Zor (Arrow Left)</li>
                <li>Boşluk → kart çevir</li>
              </ul>
            </div>
            <div class="sidebar-card glass">
              <div class="sidebar-title">📌 Kategori</div>
              <div id="sb-category" class="sb-category-name">Tüm Kelimeler</div>
            </div>
          </div>
        </div>

        <div id="visual-match-area" style="display:none" class="vm-wrapper">
          <div class="vm-layout">
            <div class="vm-question">
              <p class="vm-label">Doğru resmi seç:</p>
              <h1 id="vm-word" class="vm-target-word">Target</h1>
              <button class="btn-icon vm-speak-btn" onclick="app.speakWord(document.getElementById('vm-word').innerText)">🔊 Dinle</button>
            </div>
            <div class="vm-grid" id="vm-grid"></div>
          </div>
          <div class="game-sidebar desktop-only">
            <div class="sidebar-card glass">
              <div class="sidebar-title">📊 Bulmaca Skoru</div>
              <div class="sidebar-stats">
                <div class="s-stat correct"><span class="s-stat-val" id="vm-sb-correct">0</span><label>Doğru</label></div>
                <div class="s-stat wrong"><span class="s-stat-val" id="vm-sb-wrong">0</span><label>Yanlış</label></div>
              </div>
            </div>
            <div class="sidebar-card glass">
              <div class="sidebar-title">🎯 Nasıl Oynanır?</div>
              <ul class="sidebar-tips">
                <li>🖼️ Resme tıklayarak seç</li>
                <li>✅ Doğru: +30 XP</li>
                <li>❌ Yanlış: +5 XP</li>
                <li>📈 Ustalık güncellenir</li>
              </ul>
            </div>
          </div>
        </div>

      </div>

      <!-- SPELLING QUIZ AREA -->
      <div id="spelling-quiz-area" style="display:none" class="sq-wrapper">
        <div class="sq-layout">
          <div class="sq-main glass">
            <div class="sq-clue-row">
              <span class="sq-icon" id="sq-icon">🌌</span>
              <div class="sq-clue-text">
                <div class="sq-tr" id="sq-tr">—</div>
                <div class="sq-ex" id="sq-ex"></div>
              </div>
              <button class="btn-icon sq-hint-btn" id="sq-hint-btn" onclick="app.showSpellingHint()">💡 İpucu</button>
            </div>
            <div class="sq-letters-row" id="sq-letters"></div>
            <div class="sq-input-row">
              <input type="text" id="sq-input" class="sq-input"
                placeholder="İngilizce yaz..."
                autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false"
                onkeydown="app.handleSpellingKey(event)">
              <button class="sq-submit-btn" onclick="app.checkSpellingAnswer()">Kontrol →</button>
            </div>
            <div class="sq-result" id="sq-result"></div>
            <div class="sq-actions" id="sq-actions" style="display:none">
              <button class="sq-btn-listen" onclick="app.speakWord(document.getElementById('sq-answer').dataset.word)">🔊 Dinle</button>
              <button class="sq-btn-next" onclick="app.nextSpelling()">Sonraki →</button>
            </div>
            <div class="sq-kb-hint desktop-only">⌨️ <b>Enter</b> — Kontrol et &nbsp;•&nbsp; Doğruysa otomatik ilerler</div>
          </div>
          <div class="game-sidebar desktop-only">
            <div class="sidebar-card glass">
              <div class="sidebar-title">📊 Yazım Skoru</div>
              <div class="sidebar-stats">
                <div class="s-stat correct"><span class="s-stat-val" id="sq-sb-correct">0</span><label>Doğru</label></div>
                <div class="s-stat wrong"><span class="s-stat-val" id="sq-sb-wrong">0</span><label>Yanlış</label></div>
              </div>
            </div>
            <div class="sidebar-card glass">
              <div class="sidebar-title">🎯 Nasıl Oynanır?</div>
              <ul class="sidebar-tips">
                <li>🇹🇷 Türkçeyi gör</li>
                <li>✍️ İngilizceyi yaz</li>
                <li>✅ Doğru: +40 XP</li>
                <li>💡 İpucu: ilk harf</li>
                <li>📈 Ustalık güncellenir</li>
              </ul>
            </div>
          </div>
        </div>
      </div>

      <!-- FINISH SCREEN -->
      <div id="learn-finish" class="glass finish-card" style="display:none">
        <div class="d-icon" id="finish-icon">🏁</div>
        <h2 id="finish-title">Harika Bir Set!</h2>
        <div id="finish-stats" class="finish-stats"></div>
        <div id="failed-words-wrap" class="failed-list" style="display:none">
          <p>Tekrar Etmen Gerekenler:</p>
          <ul id="failed-words-list"></ul>
        </div>
        <div class="finish-actions">
          <button class="btn pulse-neon" onclick="app.setupLearnView()">🔄 Tekrar Oyna</button>
          <button class="btn outline" onclick="app.navigate('home')">🏠 Ana Merkez</button>
        </div>
      </div>

    </div>
  </template>

  <template id="tpl-phrases">
    <div class="view-phrases animate-in">

      <div class="phrases-hero">
        <div>
          <h2 class="phrases-title">🗣️ Günlük Kalıplar</h2>
          <p class="phrases-sub">Her duruma uygun en pratik İngilizce ifadeler</p>
        </div>
        <div class="phrase-count-badge" id="phrase-count-badge">— kalıp</div>
      </div>

      <div class="phrases-search-wrap glass">
        <span class="search-icon-inner">🔍</span>
        <input type="text" id="phrase-search" placeholder="Kalıp veya Türkçe anlam ara..." oninput="app.filterPhrases()">
      </div>

      <div class="phrases-cat-bar">
        <div id="phrase-categories" class="phrases-cat-list"></div>
      </div>

      <div class="phrases-list" id="phrases-list"></div>

    </div>
  </template>

  <template id="tpl-speak">
    <div class="view-speak animate-in">

      <div class="speak-header">
        <div class="speak-title-wrap">
          <h2 class="speak-title">🎙️ AI Telaffuz Laboratuvarı</h2>
          <p class="speak-sub">Cümleyi yüksek sesle oku — AI kelime kelime analiz etsin</p>
        </div>
        <div class="diff-tabs">
          <button class="diff-tab active" data-diff="easy"   onclick="app.setDifficulty('easy', this)">🌱 Başlangıç</button>
          <button class="diff-tab"        data-diff="medium" onclick="app.setDifficulty('medium', this)">📚 Orta</button>
          <button class="diff-tab"        data-diff="hard"   onclick="app.setDifficulty('hard', this)">🔥 İleri</button>
        </div>
      </div>

      <div class="speak-layout">

        <!-- Main panel -->
        <div class="speak-main glass">

          <div class="speak-progress-row">
            <span class="speak-counter" id="speak-counter">1 / 10</span>
            <div class="speak-prog-bar"><div class="speak-prog-fill" id="speak-prog-fill" style="width:10%"></div></div>
            <button class="speak-skip-btn" onclick="app.nextSpeakChallenge()" title="Atla">⏭</button>
          </div>

          <div class="sentence-card" id="sentence-card">
            <div class="sentence-words" id="sentence-words"></div>
          </div>

          <div class="speak-wave" id="speak-wave"></div>

          <div class="speak-controls-row">
            <button class="speak-side-btn" onclick="app.speakCurrentSentence()">
              <span>🔊</span><small>Dinle</small>
            </button>
            <button class="speak-rec-btn" id="btn-record" onclick="app.toggleRecord()">
              <span id="rec-icon">🎤</span>
              <small id="rec-label">Konuş</small>
            </button>
            <button class="speak-side-btn" onclick="app.retrySpeakChallenge()">
              <span>🔄</span><small>Tekrar</small>
            </button>
          </div>

          <div class="speak-transcript" id="s-result"></div>

          <div class="speak-score" id="s-score" style="display:none">
            <div class="score-ring-wrap">
              <svg class="score-svg" viewBox="0 0 120 120">
                <circle class="score-track" cx="60" cy="60" r="50"/>
                <circle class="score-arc"   cx="60" cy="60" r="50" id="score-arc"/>
              </svg>
              <div class="score-center">
                <span class="score-num" id="s-score-val">0</span>
                <span class="score-pct">%</span>
              </div>
            </div>
            <div class="score-detail">
              <p class="score-feedback" id="s-feedback"></p>
              <div class="word-breakdown" id="word-breakdown"></div>
              <div class="score-btns">
                <button class="btn-retry-speak" onclick="app.retrySpeakChallenge()">🔄 Tekrar</button>
                <button class="btn-next-speak"  onclick="app.nextSpeakChallenge()">Sonraki →</button>
              </div>
            </div>
          </div>

          <div class="speak-kb-hint desktop-only">⌨️ <b>Boşluk</b> — Kaydet / Durdur</div>
        </div>

        <!-- Sidebar (desktop only) -->
        <div class="speak-sidebar desktop-only">
          <div class="sidebar-card glass">
            <div class="sidebar-title">📊 Oturum</div>
            <div class="speak-session-stats" id="speak-session-stats">
              <div class="ss-stat"><span class="ss-val" id="ss-best">—</span><label>En İyi</label></div>
              <div class="ss-stat"><span class="ss-val" id="ss-avg">—</span><label>Ortalama</label></div>
              <div class="ss-stat"><span class="ss-val" id="ss-total">0</span><label>Deneme</label></div>
            </div>
          </div>
          <div class="sidebar-card glass">
            <div class="sidebar-title">📋 Son Denemeler</div>
            <div class="speak-history" id="speak-history">
              <p class="sh-empty">Henüz deneme yok</p>
            </div>
          </div>
          <div class="sidebar-card glass">
            <div class="sidebar-title">⚙️ Seçenekler</div>
            <label class="speak-toggle-label">
              <input type="checkbox" id="auto-advance" onchange="app.toggleAutoAdvance(this.checked)">
              <span>Otomatik ilerle (80%+)</span>
            </label>
          </div>
        </div>

      </div>
    </div>
  </template>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(err => console.log('SW error:', err));
      });
    }
  </script>
</body>
</html>
